<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Options Scanner Pro</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#0a0e0d;--bg2:#111714;--bg3:#161c1a;--border:rgba(255,255,255,.07);--border2:rgba(255,255,255,.13);--text:#e2e8f0;--t2:#94a3b8;--t3:#475569;--green:#34d399;--red:#f87171;--amber:#fbbf24;--purple:#a78bfa;--blue:#60a5fa;--mono:'IBM Plex Mono',monospace}
html,body{height:100%;overflow:hidden}
body{background:var(--bg);color:var(--text);font-family:'Inter',sans-serif;display:flex;flex-direction:column}
/* TOPBAR */
.topbar{background:var(--bg2);border-bottom:1px solid var(--border);padding:0 14px;height:48px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.logo{display:flex;align-items:center;gap:8px}
.logo-box{width:22px;height:22px;background:linear-gradient(135deg,#34d399,#059669);border-radius:4px;display:flex;align-items:center;justify-content:center}
.logo-box svg{width:12px;height:12px;fill:#fff}
.logo-text{font-weight:700;font-size:12px}.logo-sub{font-size:8px;color:var(--t3);font-family:var(--mono)}
.tr{display:flex;align-items:center;gap:6px}
.tdisp{font-family:var(--mono);font-size:10px;color:var(--t2);padding:3px 7px;background:var(--bg3);border:1px solid var(--border);border-radius:4px;display:flex;align-items:center;gap:4px}
.ref-dot{width:5px;height:5px;border-radius:50%;background:var(--t3);flex-shrink:0}
.ref-dot.live{background:var(--green);animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.25}}
.mbadge{display:flex;align-items:center;gap:4px;font-family:var(--mono);font-size:9px;padding:3px 8px;border-radius:4px;border:1px solid var(--border)}
.mbadge.mo{background:rgba(52,211,153,.08);border-color:rgba(52,211,153,.3)}.mbadge.mp{background:rgba(251,191,36,.08);border-color:rgba(251,191,36,.3)}.mbadge.mc{background:rgba(71,85,105,.1);border-color:rgba(71,85,105,.25)}
.ldot{width:5px;height:5px;border-radius:50%;background:#475569}
.sbtn{background:var(--green);color:#0a0e0d;border:none;border-radius:5px;padding:6px 12px;font-weight:700;font-size:11px;cursor:pointer;font-family:'Inter',sans-serif;transition:opacity .15s}
.sbtn:hover{opacity:.85}.sbtn:disabled{opacity:.4;cursor:default}
/* TABS */
.mode-tabs{background:var(--bg2);border-bottom:1px solid var(--border);display:flex;padding:0 8px;flex-shrink:0}
.mode-tab{flex:1;background:none;border:none;color:var(--t3);padding:8px 3px;font-size:10px;font-weight:500;cursor:pointer;border-bottom:2px solid transparent;transition:all .18s;font-family:'Inter',sans-serif;display:flex;align-items:center;justify-content:center;gap:3px;white-space:nowrap}
.mode-tab:hover{color:var(--t2)}.mode-tab.active{color:var(--green);border-bottom-color:var(--green)}
.mode-tab.put-tab.active{color:var(--red);border-bottom-color:var(--red)}
.mode-badge{background:var(--bg3);border:1px solid var(--border);border-radius:8px;font-size:8px;font-family:var(--mono);padding:1px 5px;color:var(--t3)}
/* LAYOUT */
.layout{display:flex;flex:1;overflow:hidden;min-height:0}
.sidebar{width:195px;background:var(--bg2);border-right:1px solid var(--border);display:flex;flex-direction:column;flex-shrink:0}
.sbhdr{padding:7px 10px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;flex-shrink:0}
.sbtitle{font-size:10px;font-weight:600}.scnt{font-size:8px;font-family:var(--mono);color:var(--t3)}
#slist{overflow-y:auto;flex:1}
.main{flex:1;overflow-y:auto;padding:12px}
/* SIDEBAR ITEMS */
.sitem{padding:8px 10px;border-bottom:1px solid var(--border);cursor:pointer;transition:background .12s;position:relative}
.sitem:hover{background:rgba(255,255,255,.02)}.sitem.active{background:rgba(52,211,153,.05);border-left:2px solid var(--green)}.sitem.active.put-active{background:rgba(248,113,113,.05);border-left-color:var(--red)}
.sitem.intrade{background:rgba(52,211,153,.03)}.sitem.at-entry{background:rgba(52,211,153,.08) !important}
.srow1{display:flex;justify-content:space-between;align-items:center;margin-bottom:1px}
.stk{font-weight:700;font-size:11px;font-family:var(--mono)}.rnum{font-size:8px;font-family:var(--mono);color:var(--t3)}
/* ENTRY FLASH */
.entry-badge{background:var(--green);color:#0a0e0d;font-weight:700;font-size:7px;padding:1px 4px;border-radius:2px;font-family:var(--mono);animation:entry-blink .6s infinite;margin-left:4px}
@keyframes entry-blink{0%,100%{opacity:1;background:var(--green)}50%{opacity:.2;background:transparent;color:var(--green);border:1px solid var(--green)}}
.put-badge{background:var(--red);color:#fff;font-weight:700;font-size:7px;padding:1px 4px;border-radius:2px;font-family:var(--mono);animation:entry-blink .6s infinite}
.sname{font-size:9px;color:var(--t2);margin-bottom:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.sprow{display:flex;justify-content:space-between;margin-bottom:3px}
.sp{font-family:var(--mono);font-size:11px;font-weight:600}.chg{font-family:var(--mono);font-size:9px}.cu{color:var(--green)}.cd{color:var(--red)}
.swrap{margin-bottom:3px}.stop2{display:flex;justify-content:space-between;font-size:8px;color:var(--t3);font-family:var(--mono);margin-bottom:2px}
.sbar{height:2px;background:var(--bg3);border-radius:2px;overflow:hidden}.sfill{height:100%;border-radius:2px}
.sfill-sp{background:linear-gradient(90deg,var(--green),#059669)}.sfill-un{background:linear-gradient(90deg,var(--purple),#7c3aed)}.sfill-put{background:linear-gradient(90deg,var(--red),#dc2626)}
.tags{display:flex;flex-wrap:wrap;gap:2px;margin-bottom:3px}
.tag{font-size:7px;font-family:var(--mono);padding:1px 4px;border-radius:2px;border:1px solid}
.tbuy{background:rgba(52,211,153,.1);color:var(--green);border-color:rgba(52,211,153,.25)}.twat{background:rgba(251,191,36,.08);color:var(--amber);border-color:rgba(251,191,36,.2)}
.tcall{background:rgba(96,165,250,.08);color:var(--blue);border-color:rgba(96,165,250,.2)}.tflow{background:rgba(167,139,250,.1);color:var(--purple);border-color:rgba(167,139,250,.2)}
.tput{background:rgba(248,113,113,.1);color:var(--red);border-color:rgba(248,113,113,.25)}
.ichk{display:flex;align-items:center;gap:3px;margin-top:2px}.ichk input{accent-color:var(--green);cursor:pointer}.ichk label{font-size:9px;color:var(--t2);cursor:pointer}
.tpill{font-size:8px;font-family:var(--mono);margin-top:2px;font-weight:600}
/* CUSTOM SEARCH */
.cust-search{padding:7px 9px;border-bottom:1px solid var(--border);flex-shrink:0}
.cust-row{display:flex;gap:4px;margin-bottom:5px}
.cust-inp{flex:1;background:var(--bg3);border:1px solid var(--border2);border-radius:4px;padding:5px 7px;color:var(--text);font-family:var(--mono);font-size:11px;outline:none;min-width:0}
.cust-inp:focus{border-color:var(--green)}
.cust-go{background:var(--green);color:#0a0e0d;border:none;border-radius:4px;padding:5px 8px;font-weight:700;font-size:10px;cursor:pointer}
.cust-go:disabled{opacity:.4;cursor:default}
.cust-quick{display:flex;flex-wrap:wrap;gap:2px}
.qbtn{background:var(--bg3);border:1px solid var(--border);border-radius:3px;padding:2px 5px;color:var(--t3);font-family:var(--mono);font-size:8px;cursor:pointer;transition:all .1s}
.qbtn:hover{border-color:var(--green);color:var(--green)}
/* CHART PANEL */
.chdr{margin-bottom:10px}
.ctop{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:3px}
.ctk{font-size:17px;font-weight:700;display:flex;align-items:center;gap:6px;flex-wrap:wrap}
.cnm{font-size:9px;color:var(--t2)}.cpb{text-align:right}
.cp{font-size:22px;font-weight:700;font-family:var(--mono)}
/* PRE/POST MARKET */
.ext-price{font-size:10px;font-family:var(--mono);margin-top:2px;padding:2px 6px;border-radius:3px;display:inline-block}
.ext-pre{background:rgba(251,191,36,.1);border:1px solid rgba(251,191,36,.25);color:var(--amber)}
.ext-post{background:rgba(96,165,250,.08);border:1px solid rgba(96,165,250,.2);color:var(--blue)}
/* RANGE */
.range-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:6px}
.rtabs{display:flex;gap:1px;background:var(--bg3);border-radius:5px;padding:2px}
.rtab{background:none;border:none;color:var(--t3);font-family:var(--mono);font-size:9px;font-weight:500;padding:3px 9px;border-radius:3px;cursor:pointer;transition:all .12s}
.rtab:hover{color:var(--text)}.rtab.ra{background:var(--bg2);color:var(--green);border:1px solid var(--border2)}
.chart-upd{font-size:8px;color:var(--t3);font-family:var(--mono)}
.ccanvas{position:relative;height:255px;margin-bottom:10px;background:var(--bg2);border:1px solid var(--border);border-radius:7px;padding:10px}
.legend{display:flex;flex-wrap:wrap;gap:9px;margin-bottom:10px}
.li{display:flex;align-items:center;gap:4px;font-size:9px;color:var(--t2);font-family:var(--mono)}.ld{width:8px;height:8px;border-radius:2px}
/* ZONES + GRIDS */
.zones{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;margin-bottom:10px}
.zone{background:var(--bg2);border:1px solid var(--border);border-radius:6px;padding:8px 10px}
.ze{border-color:rgba(52,211,153,.25)}.zs{border-color:rgba(248,113,113,.25)}.zst{border-color:rgba(251,191,36,.25)}
.zlbl{font-size:8px;color:var(--t2);font-family:var(--mono);margin-bottom:2px}.zval{font-size:15px;font-weight:700;font-family:var(--mono)}
.ze .zval{color:var(--green)}.zs .zval{color:var(--red)}.zst .zval{color:var(--amber)}
.ogrid{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;margin-bottom:10px}
.ocard{background:var(--bg2);border:1px solid var(--border);border-radius:6px;padding:8px 10px}
.olbl{font-size:8px;color:var(--t3);font-family:var(--mono);margin-bottom:2px}.oval{font-size:12px;font-weight:600;font-family:var(--mono)}
.og{color:var(--green)}.ob{color:var(--blue)}.oa{color:var(--amber)}.op{color:var(--purple)}.or{color:var(--red)}
.flow-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:6px;margin-bottom:10px}
.flow-card{background:var(--bg2);border:1px solid rgba(167,139,250,.2);border-radius:6px;padding:8px 10px}
.flow-lbl{font-size:8px;color:var(--purple);font-family:var(--mono);margin-bottom:2px}.flow-val{font-size:12px;font-weight:600}
/* WHY SECTION */
.why-box{background:var(--bg2);border:1px solid var(--border2);border-radius:8px;padding:11px 13px;margin-bottom:10px}
.why-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:7px}
.why-title{font-size:11px;font-weight:600;display:flex;align-items:center;gap:5px}
.why-up{background:rgba(52,211,153,.12);color:var(--green);border:1px solid rgba(52,211,153,.3);border-radius:3px;font-size:8px;font-family:var(--mono);padding:2px 6px}
.why-dn{background:rgba(248,113,113,.1);color:var(--red);border:1px solid rgba(248,113,113,.3);border-radius:3px;font-size:8px;font-family:var(--mono);padding:2px 6px}
.why-analysis{font-size:11px;color:var(--t2);line-height:1.75;margin-bottom:7px}
.why-news{border-top:1px solid var(--border);padding-top:7px}
.why-news-ttl{font-size:8px;font-family:var(--mono);color:var(--t3);margin-bottom:4px;text-transform:uppercase;letter-spacing:.05em}
.news-hl{display:flex;align-items:flex-start;gap:5px;margin-bottom:4px;font-size:10px;color:var(--t2);line-height:1.5}
.news-hl-dot{color:var(--green);flex-shrink:0;font-size:7px;margin-top:3px}
/* TRADE + SIGNAL */
.abox{background:var(--bg2);border:1px solid var(--border);border-radius:6px;padding:10px 12px;font-size:10px;color:var(--t2);line-height:1.75;margin-bottom:10px}
.tbox{background:rgba(52,211,153,.04);border:1px solid rgba(52,211,153,.15);border-radius:6px;padding:9px 12px;display:flex;align-items:center;gap:7px;margin-bottom:10px}
.tbox input{accent-color:var(--green);width:13px;height:13px;cursor:pointer}.tbox label{font-size:11px;font-weight:500;cursor:pointer}
.sig-bar{border-radius:8px;padding:11px 14px;margin-bottom:10px;border:1.5px solid}
.sig-hold{background:rgba(52,211,153,.04);border-color:rgba(52,211,153,.22)}
.sig-sell-stop{background:rgba(248,113,113,.08);border-color:var(--red)}
.sig-sell-profit{background:rgba(52,211,153,.08);border-color:var(--green)}
.sig-top{display:flex;align-items:center;gap:8px;margin-bottom:5px}
.sig-lbl{font-size:17px;font-weight:700;font-family:var(--mono)}
.sig-sub{font-size:9px;font-family:var(--mono);color:var(--t2);letter-spacing:.06em;text-transform:uppercase}
.sig-pnl{margin-left:auto;font-size:19px;font-weight:700;font-family:var(--mono)}
.sig-det{font-size:11px;color:var(--t2);font-family:var(--mono);line-height:1.7;margin-bottom:3px}
.sig-upd{font-size:9px;color:var(--t3);font-family:var(--mono)}
@keyframes blink-bad{0%,100%{opacity:1}50%{opacity:.08}}
@keyframes blink-good{0%,100%{opacity:1}50%{opacity:.25}}
.blink-bad{animation:blink-bad .7s infinite;color:var(--red)!important}
.blink-good{animation:blink-good 1.1s infinite;color:var(--green)!important}
/* PREDICTIONS */
.pred-section{background:var(--bg2);border:1px solid var(--border2);border-radius:8px;padding:12px 14px;margin-bottom:10px}
.pred-title{font-size:11px;font-weight:600;margin-bottom:9px;display:flex;align-items:center;gap:6px}
.pred-btns{display:flex;gap:6px;margin-bottom:10px}
.pred-btn{flex:1;background:var(--bg3);border:1px solid var(--border2);border-radius:6px;padding:8px 6px;font-size:10px;font-family:var(--mono);font-weight:500;color:var(--t2);cursor:pointer;transition:all .15s;text-align:center}
.pred-btn:hover{border-color:var(--green);color:var(--green)}
.pred-btn.active{background:rgba(52,211,153,.08);border-color:var(--green);color:var(--green)}
.pred-btn.loading{opacity:.5;cursor:wait}
#pred-result{min-height:50px;font-size:11px;color:var(--t2);line-height:1.8;font-family:'Inter',sans-serif}
.pred-ai-tag{display:inline-flex;align-items:center;gap:4px;background:rgba(167,139,250,.12);border:1px solid rgba(167,139,250,.3);color:var(--purple);border-radius:3px;font-size:8px;font-family:var(--mono);padding:1px 5px;margin-bottom:6px}
.pred-rule-tag{display:inline-flex;align-items:center;gap:4px;background:rgba(251,191,36,.08);border:1px solid rgba(251,191,36,.2);color:var(--amber);border-radius:3px;font-size:8px;font-family:var(--mono);padding:1px 5px;margin-bottom:6px}
/* ROCKET */
.rocket-tag{background:rgba(251,191,36,.12);color:var(--amber);border:1px solid rgba(251,191,36,.25);border-radius:3px;font-size:8px;font-family:var(--mono);padding:2px 5px}
.pot-bar{background:var(--bg3);border-radius:2px;height:2px;margin-top:3px;overflow:hidden}
.pot-fill{background:linear-gradient(90deg,var(--amber),#f97316);height:2px;border-radius:2px}
/* LOADING + MISC */
.lov{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;gap:10px;color:var(--t2)}
.spin{width:24px;height:24px;border:2px solid var(--border);border-top-color:var(--green);border-radius:50%;animation:spin .8s linear infinite}
.lmsg{font-size:11px;font-family:var(--mono)}
@keyframes spin{to{transform:rotate(360deg)}}
.errmsg{background:rgba(248,113,113,.08);border:1px solid rgba(248,113,113,.25);border-radius:6px;padding:12px;font-size:11px;color:var(--red);margin:12px;line-height:1.9}
.src-note{font-size:8px;font-family:var(--mono);color:var(--t3);margin-bottom:6px}
.abanner{position:fixed;bottom:42px;right:12px;background:var(--bg2);border:1px solid var(--green);border-radius:7px;padding:9px 26px 9px 11px;max-width:270px;z-index:999;animation:slin .25s ease}
@keyframes slin{from{transform:translateX(12px);opacity:0}to{transform:translateX(0);opacity:1}}
.abtitle{font-weight:600;color:var(--green);margin-bottom:1px;font-family:var(--mono);font-size:10px}
.aclose{position:absolute;top:5px;right:7px;background:none;border:none;color:var(--t3);cursor:pointer;font-size:13px}
/* MARKET BAR */
.market-bar{height:33px;background:var(--bg2);border-top:1px solid var(--border);display:flex;align-items:center;flex-shrink:0;overflow:hidden;z-index:50}
.mkt-sect{display:flex;align-items:center;gap:5px;flex-shrink:0;border-right:1px solid var(--border);height:100%;padding:0 10px}
.mkt-lbl{font-family:var(--mono);font-size:9px;font-weight:700;color:var(--t3)}
.mkt-price{font-family:var(--mono);font-size:10px;font-weight:700}
.mkt-sig{font-family:var(--mono);font-size:8px;padding:1px 5px;border-radius:3px;font-weight:600;border:1px solid}
.mkt-bull{background:rgba(52,211,153,.1);color:var(--green);border-color:rgba(52,211,153,.3)}
.mkt-bear{background:rgba(248,113,113,.08);color:var(--red);border-color:rgba(248,113,113,.3)}
.mkt-flat{background:rgba(251,191,36,.07);color:var(--amber);border-color:rgba(251,191,36,.25)}
.mkt-ts{font-family:var(--mono);font-size:8px;color:var(--t3);padding:0 7px;flex-shrink:0;border-right:1px solid var(--border)}
.news-wrap{flex:1;overflow:hidden;position:relative;height:100%;-webkit-mask-image:linear-gradient(90deg,transparent,black 25px,black calc(100% - 25px),transparent);mask-image:linear-gradient(90deg,transparent,black 25px,black calc(100% - 25px),transparent)}
.news-track{display:flex;align-items:center;height:100%;white-space:nowrap;animation:scroll-left 80s linear infinite}
.news-track:hover{animation-play-state:paused}
@keyframes scroll-left{0%{transform:translateX(100vw)}100%{transform:translateX(-200%)}}
.news-item{display:inline-flex;align-items:center;gap:5px;padding:0 16px;font-size:9px;font-family:var(--mono);color:var(--t2)}
.news-sym{font-weight:600;color:var(--green)}.news-sep{color:var(--t3)}
</style>
</head>
<body>
<!-- TOPBAR -->
<div class="topbar">
  <div class="logo">
    <div class="logo-box"><svg viewBox="0 0 24 24"><path d="M3 3h7v7H3zM14 3h7v7h-7zM14 14h7v7h-7zM3 14h7v7H3z"/></svg></div>
    <div><div class="logo-text">Options Scanner Pro</div><div class="logo-sub">Abiy Kassa · St Louis MO</div></div>
  </div>
  <!-- Ethiopian Flag -->
  <div title="🇪🇹 Ethiopia" style="display:flex;flex-direction:column;width:32px;height:20px;border-radius:3px;overflow:hidden;box-shadow:0 0 0 1px rgba(255,255,255,.1);flex-shrink:0;margin-left:4px">
    <div style="flex:1;background:#009A44"></div>
    <div style="flex:1;background:#FCDD09"></div>
    <div style="flex:1;background:#DD2033"></div>
  </div>
  <div class="tr">
    <div class="tdisp" id="clk">—</div>
    <div class="tdisp" id="last-refresh" style="display:none"><div class="ref-dot" id="ref-dot"></div><span id="ref-txt">—</span></div>
    <div class="mbadge mp" id="mbadge"><span class="ldot" id="ldot"></span><span id="mlbl">Loading</span></div>
    <button onclick="testTelegram()" title="Test Telegram notification" style="background:var(--bg3);border:1px solid var(--border2);color:var(--t2);border-radius:5px;padding:6px 10px;font-size:11px;cursor:pointer">🔔 Test</button>
    <button class="sbtn" id="scanBtn" onclick="runScan()">▶ Scan Morning Picks</button>
  </div>
</div>
<!-- TABS -->
<div class="mode-tabs">
  <button class="mode-tab active" id="tab-sp"     onclick="switchMode('sp',this)">📊 S&amp;P Calls <span class="mode-badge" id="badge-sp">—</span></button>
  <button class="mode-tab put-tab" id="tab-puts"  onclick="switchMode('puts',this)">📉 Top Puts <span class="mode-badge" id="badge-puts">—</span></button>

function squeezeScore(q){
  const price=q.regularMarketPrice||0,mc=q.marketCap||0;
  // Exclude: above $40 (hard to squeeze), below $0.30 (too risky), mc > $1B
  if(price<0.30||price>40||mc>1e9) return 0;
  let s=50;
  const chg=q.regularMarketChangePercent||0;
  const vr=(q.regularMarketVolume||0)/(q.averageDailyVolume3Month||1);
  const shortPct=q.shortPercentOfFloat||0; // already in % from server
  const floatSh=q.floatShares||0;
  const shortRatio=q.shortRatio||0;

  // ── SHORT INTEREST (0-30 pts) — KEY squeeze fuel ──
  if(shortPct>40)s+=30; else if(shortPct>25)s+=23; else if(shortPct>15)s+=16; else if(shortPct>8)s+=9; else if(shortPct>3)s+=4;

  // ── FLOAT SIZE (0-25 pts) — smaller = bigger squeeze ──
  if(floatSh>0){
    if(floatSh<2e6)s+=25;       // ultra low float <2M
    else if(floatSh<5e6)s+=20;  // very low <5M
    else if(floatSh<10e6)s+=14; // low <10M
    else if(floatSh<20e6)s+=8;  // moderate <20M
    else if(floatSh<50e6)s+=3;
    else s-=8;                   // high float = weak squeeze
  }

  // ── VOLUME SPIKE (0-20 pts) — confirms momentum ──
  if(vr>15)s+=20; else if(vr>8)s+=15; else if(vr>5)s+=10; else if(vr>3)s+=6; else if(vr>2)s+=3; else s-=8;

  // ── PRICE MOMENTUM (0-15 pts) ──
  if(chg>15)s+=15; else if(chg>8)s+=11; else if(chg>4)s+=7; else if(chg>1)s+=3; else if(chg<-5)s-=10;

  // ── SHORT RATIO (days to cover) bonus ──
  if(shortRatio>5)s+=8; else if(shortRatio>3)s+=4;

  // ── PRICE SWEET SPOT ($1-$15) — best for day trading squeezes ──
  if(price>=1&&price<=15)s+=5;

  return Math.min(99,Math.max(0,Math.round(s)));
}

function scoreBull(q) {
  // Professional bullish (CALL) scoring
  const p=q.regularMarketPrice||0, hi=q.fiftyTwoWeekHigh||p, lo=q.fiftyTwoWeekLow||p*0.7;
  const chg=q.regularMarketChangePercent||0;

  const mc=q.marketCap||0;
  const rangePos=(p-lo)/((hi-lo)||1); // 0=52wk low, 1=52wk high
  const pre=q.preMarketPrice||0;
  let s=50;

  if(chg>5)s+=25; else if(chg>3)s+=19; else if(chg>2)s+=14; else if(chg>1)s+=9; else if(chg>0)s+=4; else if(chg<-3)s-=18; else if(chg<-1)s-=8; else if(chg<0)s-=3;

  return Math.min(99,Math.max(30,Math.round(s)));
}
function scoreBear(q) {

  else if(c<0)parts.push(`Minor ${Math.abs(c).toFixed(2)}% pullback — potential buying opportunity forming near entry zone.`);
  else parts.push(`Flat on ${vr.toFixed(1)}x volume — consolidation, wait for directional break with volume.`);
  parts.push(`Trading at ${rangePos}% of 52-week range ($${lo.toFixed(2)}–$${hi.toFixed(2)}). ${parseFloat(rangePos)>75?'Near annual high — strong relative strength vs peers.':parseFloat(rangePos)<35?'In lower range — recovery potential if fundamentals hold.':'Mid-range — breakout above resistance would confirm bull thesis.'}`);
  if(mc>200e9)parts.push(`Mega-cap ($${fmtBig(mc)}) — deep options market, tight spreads, institutional-grade liquidity.`);
  else if(mc>20e9)parts.push(`Large-cap ($${fmtBig(mc)}) — solid options liquidity with meaningful institutional participation.`);
  return parts.join(' ');
}

// ─── WEEKLY SIGNAL ───────────────────────────────────────────────────
function weekSignal(s){
  const chg=s.regularMarketChangePercent||0;
  const vr=s._vr||1;
  const p=s.regularMarketPrice||0;
  const hi=s.fiftyTwoWeekHigh||p,lo=s.fiftyTwoWeekLow||p*0.7;
  const rng=(p-lo)/((hi-lo)||1);
  const pre=s.preMarketPrice||0;
  let bull=0,bear=0;
  if(chg>4)bull+=4;else if(chg>2)bull+=3;else if(chg>1)bull+=2;else if(chg>0)bull+=1;
  else if(chg<-4)bear+=4;else if(chg<-2)bear+=3;else if(chg<-1)bear+=2;else if(chg<0)bear+=1;
  if(vr>2&&chg>0)bull+=2;else if(vr>2&&chg<0)bear+=2;else if(vr>1.5)bull+=1;
  if(rng>0.80)bull+=3;else if(rng>0.60)bull+=2;else if(rng>0.40)bull+=1;
  else if(rng<0.20)bear+=3;else if(rng<0.40)bear+=2;
  if(pre>0&&pre>p*1.01)bull+=2;else if(pre>0&&pre<p*0.99)bear+=2;
  const d=bull-bear;
  if(d>=4)return{label:'📈 BULL WEEK',short:'📈 BULL',color:'var(--green)',bg:'rgba(52,211,153,.1)',border:'rgba(52,211,153,.3)'};
  if(d<=-4)return{label:'📉 BEAR WEEK',short:'📉 BEAR',color:'var(--red)',bg:'rgba(248,113,113,.08)',border:'rgba(248,113,113,.3)'};
  return{label:'➡ HOLD WEEK',short:'➡ HOLD',color:'var(--amber)',bg:'rgba(251,191,36,.08)',border:'rgba(251,191,36,.25)'};
}
function wkBadgeHtml(s){
  var w=weekSignal(s);

}

function rrect(ctx,x,y,w,h,r){ctx.beginPath();ctx.moveTo(x+r,y);ctx.lineTo(x+w-r,y);ctx.arcTo(x+w,y,x+w,y+r,r);ctx.lineTo(x+w,y+h-r);ctx.arcTo(x+w,y+h,x+w-r,y+h,r);ctx.lineTo(x+r,y+h);ctx.arcTo(x,y+h,x,y+h-r,r);ctx.lineTo(x,y+r);ctx.arcTo(x,y,x+r,y,r);ctx.closePath();}
const plPlugin={id:'pl',afterDraw(chart){
  const cfg=chart.options.plugins.pl;if(!cfg)return;
  const{ctx,chartArea:{left,right,top,bottom},scales:{y:yS}}=chart;
  [{v:cfg.entry,color:'#34d399',lbl:'▲ ENTRY  $'+cfg.entry},{v:cfg.target,color:cfg.isPut?'#34d399':'#f87171',lbl:(cfg.isPut?'▼':'▶')+' TARGET $'+cfg.target},{v:cfg.stop,color:cfg.isPut?'#f87171':'#fbbf24',lbl:'■ STOP   $'+cfg.stop}].forEach(({v,color,lbl})=>{
    const y=yS.getPixelForValue(v);if(y<top-2||y>bottom+2)return;
    ctx.save();ctx.beginPath();ctx.setLineDash([4,5]);ctx.strokeStyle=color;ctx.lineWidth=1;ctx.globalAlpha=.5;ctx.moveTo(left,y);ctx.lineTo(right-110,y);ctx.stroke();
    ctx.setLineDash([]);ctx.globalAlpha=1;ctx.font='600 9px IBM Plex Mono,monospace';const tw=ctx.measureText(lbl).width,px=right-tw-12;

// ─── AI PREDICTION ───
async function getPrediction(ticker, timeframe){
  const btns={'today':'pred-today','week':'pred-week','year':'pred-year'};
  Object.values(btns).forEach(id=>{const b=document.getElementById(id);if(b)b.classList.remove('active');});
  const activeBtn=document.getElementById(btns[timeframe]);
  if(activeBtn){activeBtn.classList.add('active','loading');}
  const result=document.getElementById('pred-result');
  if(result)result.innerHTML='<div class="spin" style="width:18px;height:18px;border-width:1.5px;margin:8px auto"></div>';
  try{
    // Pass current stock data so server doesn't need to re-fetch (avoids $0 bug)
    const allPP=[...spPicks,...putPicks,...ufPicks,...rocketPicks,...squeezePicks,...Object.values(customStocks)];
    const sdata=allPP.find(x=>x.symbol===ticker)||{};
    const pparams=new URLSearchParams({symbol:ticker,timeframe,
      price:sdata.regularMarketPrice||0,chg:sdata.regularMarketChangePercent||0,
      hi52:sdata.fiftyTwoWeekHigh||0,lo52:sdata.fiftyTwoWeekLow||0,
      vr:sdata._vr||1,mc:sdata.marketCap||0});
    const d=await(await fetch('/predict?'+pparams)).json();
    const tag=d.ai?'<div class="pred-ai-tag">✦ AI · Claude</div>':'<div class="pred-rule-tag">⚡ Technical Analysis</div>';
    const titles={'today':'📅 Today\'s Outlook','week':'📆 End-of-Week Outlook','year':'🗓️ Year-End Outlook'};
    // Extract PRICE TARGET line if present
    let predTxt=d.prediction||'';
    let ptHtml='';
    if(predTxt.startsWith('PRICE TARGET:')){
      const ln=predTxt.split('\n');
      const tgt=ln[0].replace('PRICE TARGET:','').trim();
      predTxt=(ln.slice(2).join('\n')||ln.slice(1).join('\n')).trim();
      ptHtml='<div style="background:rgba(52,211,153,.08);border:1px solid rgba(52,211,153,.25);border-radius:6px;padding:10px 12px;margin-bottom:9px"><div style="font-size:8px;font-family:var(--mono);color:var(--t3);text-transform:uppercase;letter-spacing:.05em;margin-bottom:3px">🎯 Price Target</div><div style="font-size:20px;font-weight:700;font-family:var(--mono);color:var(--green)">'+tgt+'</div></div>';
    }
    if(result)result.innerHTML=tag+ptHtml+'<strong style="font-size:11px;color:var(--text);display:block;margin-bottom:5px">'+titles[timeframe]+'</strong>'+predTxt;
  }catch(e){
    if(result)result.innerHTML='<span style="color:var(--red);font-size:10px">Prediction failed — check connection</span>';
  }
  if(activeBtn)activeBtn.classList.remove('loading');
}

// ─── TRADE SIGNAL ───
function buildSig(ticker,s,t){
  const pnl=parseFloat(t.pnl||0),ps=(pnl>=0?'+':'')+pnl.toFixed(2)+'%',cur=(t.currentPrice||t.entry).toFixed(2),chk=t.lastCheck||'—';
  if(t.status==='sell-stop')return '<div class="sig-bar sig-sell-stop"><div class="sig-top"><span class="sig-lbl blink-bad">🛑 SELL</span><span class="sig-sub">'+(t.mode==='squeeze'?'STOP HIT — SELL SHARES NOW':'STOP HIT — EXIT NOW')+'</span><span class="sig-pnl" style="color:var(--red)">'+ps+'</span></div><div class="sig-det">Entry $'+t.entry+' · Now <strong style="color:var(--red)">$'+cur+'</strong> · Stop $'+s._stop+' breached</div><div class="sig-upd">● Live · last check '+chk+' · every 30 sec</div></div>';
  if(t.status==='sell-target')return '<div class="sig-bar sig-sell-profit"><div class="sig-top"><span class="sig-lbl blink-good">🎯 SELL</span><span class="sig-sub">'+(t.mode==='squeeze'?'TARGET HIT — SELL SHARES':'TARGET REACHED — TAKE PROFIT')+'</span><span class="sig-pnl" style="color:var(--green)">'+ps+'</span></div><div class="sig-det">Entry $'+t.entry+' · Now <strong style="color:var(--green)">$'+cur+'</strong> · Target $'+s._target+' ✓</div><div class="sig-upd">● Live · last check '+chk+' · every 30 sec</div></div>';
  var tradeType=t.mode==='squeeze'?'STOCK':'OPTION';
  return '<div class="sig-bar sig-hold"><div class="sig-top"><span class="sig-lbl" style="color:var(--green)">✓ HOLD</span><span class="sig-sub">'+(t.mode==='squeeze'?'HOLDING STOCK — IN RANGE':'OPTION IN RANGE')+'</span><span class="sig-pnl" style="color:'+(pnl>=0?'var(--green)':'var(--red)')+'">'+ps+'</span></div><div class="sig-det">Entry $'+t.entry+' · Now <strong style="color:'+(pnl>=0?'var(--green)':'var(--amber)')+'">$'+cur+'</strong> · <span style="color:var(--green)">Target $'+s._target+'</span> · <span style="color:var(--amber)">Stop $'+s._stop+'</span></div><div class="sig-upd">● Live · last check '+chk+' · every 30 sec</div></div>';
}

// ─── TRADE TRACKING ───
function toggleTrade(ticker,mode,checked){
  const allP=mode==='custom'?Object.values(customStocks):mode==='rocket'?rocketPicks:mode==='puts'?putPicks:mode==='squeeze'?squeezePicks:mode==='sp'?spPicks:ufPicks;
  const s=allP.find(x=>x.symbol===ticker);if(!s)return;
  if(checked){trades[ticker]={entry:s._entry,time:new Date().toLocaleTimeString(),mode,status:'hold',pnl:'0.00',currentPrice:s._entry,lastCheck:'just opened'};showAlert(ticker,'Tracking · Entry $'+s._entry+' · Target $'+s._target+' · Stop $'+s._stop);startAutoRefresh();}
  else delete trades[ticker];
  if(mode==='custom')renderCustomSidebar();else if(mode==='rocket')renderRocketSidebar();else if(mode==='squeeze')renderSqueezeSidebar();else renderSidebar();
  if(selTicker===ticker)selectStock(ticker,mode);
}

// ─── AUTO-REFRESH ───
function startAutoRefresh(){
  if(autoRefreshTimer)return;
  autoRefreshTimer=setInterval(doRefresh,30000);
  const lr=document.getElementById('last-refresh');if(lr)lr.style.display='';
  const d=document.getElementById('ref-dot');if(d)d.classList.add('live');
  document.getElementById('ref-txt').textContent='Auto ON';
}
async function doRefresh(){
  const allSyms=[...new Set([...spPicks.map(s=>s.symbol),...putPicks.map(s=>s.symbol),...ufPicks.map(s=>s.symbol),...rocketPicks.map(s=>s.symbol),...Object.keys(customStocks),...Object.keys(trades)])];
  if(!allSyms.length)return;
  const d=document.getElementById('ref-dot');if(d)d.style.background='var(--amber)';
  const quotes=await priceFetch(allSyms);
  if(!quotes.length){if(d)d.style.background='var(--red)';return;}
  quotes.forEach(q=>{
    [spPicks,putPicks,ufPicks,rocketPicks,squeezePicks].forEach(arr=>{const i=arr.findIndex(s=>s.symbol===q.symbol);if(i>=0){arr[i].regularMarketPrice=q.regularMarketPrice;arr[i].regularMarketChangePercent=q.regularMarketChangePercent;arr[i].regularMarketVolume=q.regularMarketVolume;arr[i]._vr=+((q.regularMarketVolume||0)/(arr[i].averageDailyVolume3Month||1)).toFixed(1);}});
    if(customStocks[q.symbol]){customStocks[q.symbol].regularMarketPrice=q.regularMarketPrice;customStocks[q.symbol].regularMarketChangePercent=q.regularMarketChangePercent;customStocks[q.symbol].regularMarketVolume=q.regularMarketVolume;}
  });
  updateTrades(quotes);
  // Check entry zone for all scanned picks and alert via Telegram
  const allTracked=[...spPicks,...putPicks,...ufPicks,...rocketPicks,...squeezePicks,...Object.values(customStocks)];
  allTracked.forEach(s=>{
    if(atEntry(s)&&!s._tgEntryFired){
      s._tgEntryFired=true;
      const dir=s._mode==='puts'?'PUT':'CALL';
      tgAlert(`🎯 ENTRY ZONE REACHED\n${s.symbol} — ${s.shortName||s.symbol}\n💰 Entry: $${s._entry} | Target: $${s._target} | Stop: $${s._stop}\n📈 ${dir} $${s._op?.strike} exp ${s._op?.expiryStr}\nPrice now: $${(s.regularMarketPrice||0).toFixed(2)}`);
    }
    if(!atEntry(s)) s._tgEntryFired=false; // reset when price moves away
  });
  if(selMode==='custom')renderCustomSidebar();else if(selMode==='rocket')renderRocketSidebar();else renderSidebar();
  updateLivePrice();
  if(selTicker&&activeChart){
    if(currentRange==='1D'||currentRange==='1W'){const h2=await fetchHist(selTicker,RANGES[currentRange].period,RANGES[currentRange].interval);if(h2.length){activeChart.data.labels=h2.map(h=>h.date);activeChart.data.datasets[0].data=h2.map(h=>h.close);activeChart.update('none');}}
    else{const allP=[...spPicks,...putPicks,...ufPicks,...rocketPicks,...Object.values(customStocks)],s=allP.find(x=>x.symbol===selTicker);if(s&&activeChart.data.datasets[0].data.length){const len=activeChart.data.datasets[0].data.length;activeChart.data.datasets[0].data[len-1]=s.regularMarketPrice;activeChart.update('none');}}
  }
  const ts=new Date().toLocaleTimeString('en-US',{hour:'2-digit',minute:'2-digit',second:'2-digit',timeZone:'America/New_York'});
  document.getElementById('ref-txt').textContent='↻ '+ts+' ET';
  if(d){d.style.background='';d.classList.add('live');}
}
function updateLivePrice(){
  if(!selTicker)return;
  const allP=[...spPicks,...putPicks,...ufPicks,...rocketPicks,...Object.values(customStocks)],s=allP.find(x=>x.symbol===selTicker);if(!s)return;
  const pe=document.getElementById('live-price'),ce=document.getElementById('live-chg');
  if(pe)pe.textContent='$'+(s.regularMarketPrice||0).toFixed(2);
  if(ce){const chg=s.regularMarketChangePercent||0;ce.textContent=(chg>=0?'+':'')+chg.toFixed(2)+'% today';ce.className='chg '+(chg>=0?'cu':'cd');}
}
function updateTrades(quotes){
  quotes.forEach(q=>{
    const t=trades[q.symbol];if(!t)return;
    const price=q.regularMarketPrice,allP=[...spPicks,...putPicks,...ufPicks,...rocketPicks,...squeezePicks,...Object.values(customStocks)],s=allP.find(x=>x.symbol===q.symbol);if(!s)return;
    const pnl=((price-t.entry)/t.entry*100).toFixed(2);
    trades[q.symbol].currentPrice=price;trades[q.symbol].pnl=pnl;trades[q.symbol].lastCheck=new Date().toLocaleTimeString();
    const prev=t.status;
    if(price>=s._target&&s._mode!=='puts'){trades[q.symbol].status='sell-target';if(prev!=='sell-target'){showAlert(q.symbol,'🎯 SELL — Target! $'+price.toFixed(2)+' P&L: +'+pnl+'%');tgAlert('💰 TARGET REACHED — '+q.symbol+'\nPrice: $'+price.toFixed(2)+' | Entry was: $'+t.entry+'\nP&L: +'+pnl+'%\n✅ TAKE PROFIT — target hit');}}
    else if(price<=s._target&&s._mode==='puts'){trades[q.symbol].status='sell-target';if(prev!=='sell-target'){showAlert(q.symbol,'🎯 SELL PUT — Target! $'+price.toFixed(2)+' P&L: +'+pnl+'%');tgAlert('💰 PUT TARGET HIT — '+q.symbol+'\nPrice: $'+price.toFixed(2)+' | Entry: $'+t.entry+'\nP&L: +'+pnl+'%\n✅ TAKE PROFIT on PUT');}}
    else if(price<=s._stop&&s._mode!=='puts'){trades[q.symbol].status='sell-stop';if(prev!=='sell-stop'){showAlert(q.symbol,'🛑 SELL — Stop! $'+price.toFixed(2)+' P&L: '+pnl+'%');tgAlert('🛑 STOP HIT — '+q.symbol+'\nPrice: $'+price.toFixed(2)+' | Entry was: $'+t.entry+'\nP&L: '+pnl+'%\n⚠️ EXIT NOW — stop loss triggered');}}
    else if(price>=s._stop&&s._mode==='puts'){trades[q.symbol].status='sell-stop';if(prev!=='sell-stop'){showAlert(q.symbol,'🛑 SELL PUT — Stop! $'+price.toFixed(2)+' P&L: '+pnl+'%');tgAlert('🛑 PUT STOP HIT — '+q.symbol+'\nPrice: $'+price.toFixed(2)+' | Entry: $'+t.entry+'\nP&L: '+pnl+'%\n⚠️ EXIT PUT — stop triggered');}}
    else trades[q.symbol].status='hold';
  });
  if(selTicker&&trades[selTicker]){const el=document.getElementById('sig-outer'),allP=[...spPicks,...putPicks,...ufPicks,...rocketPicks,...Object.values(customStocks)],s=allP.find(x=>x.symbol===selTicker);if(el&&s)el.innerHTML=buildSig(selTicker,s,trades[selTicker]);}
}

// ─── CUSTOM LOOKUP ───
async function lookupCustom(){
  const inp=document.getElementById('custom-input');if(!inp)return;
  const sym=inp.value.trim().toUpperCase().replace(/[^A-Z.]/g,'');if(!sym){inp.focus();return;}
  const btn=document.getElementById('lookup-btn');if(btn){btn.disabled=true;btn.textContent='...';}
  document.getElementById('mpanel').innerHTML='<div class="lov"><div class="spin"></div><div class="lmsg">Fetching '+sym+'...</div></div>';
  try{
    const quotes=await yFetch([sym]);
    if(!quotes.length||!(quotes[0].regularMarketPrice>0))throw new Error('No data for '+sym);
    const q=quotes[0],s={...q,_score:scoreBull(q),_mode:'custom',_op:optPC(q.symbol,q.regularMarketPrice),_entry:+(q.regularMarketPrice*0.995).toFixed(2),_target:+(q.regularMarketPrice*1.07).toFixed(2),_stop:+(q.regularMarketPrice*0.962).toFixed(2),_vr:+((q.regularMarketVolume||0)/(q.averageDailyVolume3Month||1)).toFixed(1)};
    customStocks[sym]=s;selTicker=sym;selMode='custom';renderCustomSidebar();inp.value='';await selectStock(sym,'custom');
  }catch(e){document.getElementById('mpanel').innerHTML='<div class="errmsg"><strong>Lookup failed:</strong> '+e.message+'</div>';}
  if(btn){btn.disabled=false;btn.textContent='Go';}
}
function quickL(sym){const inp=document.getElementById('custom-input');if(inp)inp.value=sym;lookupCustom();}

// ─── MARKET BAR ───
async function refreshMarket(){
  try{
    const data=(await(await fetch('/market')).json()).result||[];
    data.forEach(q=>{
      const sl=q.symbol==='BTC-USD'?'btc':q.symbol.toLowerCase(),chg=q.change||0;
      const pe=document.getElementById(sl+'-price'),ce=document.getElementById(sl+'-chg'),se=document.getElementById(sl+'-sig');
      if(pe){
        if(q.symbol==='BTC-USD') pe.textContent='$'+Number(q.price).toLocaleString('en-US',{maximumFractionDigits:0});
        else pe.textContent='$'+q.price.toFixed(2);
        pe.style.color=chg>=0?'var(--green)':'var(--red)';
      }
      if(ce){ce.textContent=(chg>=0?'+':'')+chg.toFixed(2)+'%';ce.className='chg '+(chg>=0?'cu':'cd');}
      if(se){const cls=chg>0.4?'mkt-bull':chg<-0.4?'mkt-bear':'mkt-flat';const lbl=chg>0.4?'📈 BULL':chg<-0.4?'📉 BEAR':'➡ FLAT';se.className='mkt-sig '+cls;se.textContent=lbl;}
    });
    const ts=document.getElementById('mkt-ts');if(ts)ts.textContent=new Date().toLocaleTimeString('en-US',{hour:'2-digit',minute:'2-digit',second:'2-digit',timeZone:'America/New_York'})+' ET';
  }catch(e){console.log('Market bar:',e);}
}
async function loadNews(){
  try{
    const items=(await(await fetch('/news')).json()).items||[];
    if(!items.length)return;
    const track=document.getElementById('news-track');if(!track)return;
    track.innerHTML=items.map(n=>'<span class="news-item">'+(n.symbol?'<span class="news-sym">'+n.symbol+'</span><span class="news-sep"> · </span>':'')+n.title+' <span class="news-sep"> | </span></span>').join('');
    track.style.animationDuration=Math.max(60,items.length*7)+'s';
  }catch(e){}
}
refreshMarket();loadNews();
setInterval(refreshMarket,15000);
setInterval(loadNews,3*60000);

// ─── HELPERS ───
function showAlert(ticker,msg){document.getElementById('atitle').textContent=ticker+' — Signal';document.getElementById('abody').textContent=msg;const b=document.getElementById('abanner');b.style.display='block';setTimeout(()=>{b.style.display='none';},6000);}
function genFake(cur,n){const a=[];let p=cur*0.9;for(let i=0;i<n;i++){p+=(Math.random()-.45)*p*.02;a.push(+p.toFixed(2));}a[a.length-1]=cur;return a;}
function makeDates(n){return Array.from({length:n},(_,i)=>{const d=new Date();d.setDate(d.getDate()-n+1+i);return d.toLocaleDateString('en-US',{month:'short',day:'numeric'});});}
function fmtBig(n){if(n>=1e12)return(n/1e12).toFixed(1)+'T';if(n>=1e9)return(n/1e9).toFixed(1)+'B';if(n>=1e6)return(n/1e6).toFixed(0)+'M';return n.toFixed(0);}



async function testTelegram(){
  const btn=event.target;btn.textContent='Sending...';btn.disabled=true;
  try{
    const ctrl=new AbortController();const tid=setTimeout(()=>ctrl.abort(),30000);
    const r=await fetch('/test-telegram',{signal:ctrl.signal});clearTimeout(tid);
    const d=await r.json();
    if(d.ok){
      btn.textContent='🔔 ✅ Sent!';
      setTimeout(()=>{btn.textContent='🔔 Test';btn.disabled=false;},4000);
      showAlert('Telegram','✅ '+d.msg);
    } else {
      btn.textContent='🔔 ❌ Failed';btn.disabled=false;
      showAlert('Telegram','❌ '+d.msg);
    }
  }catch(e){
    btn.textContent='🔔 Retry';btn.disabled=false;
    showAlert('Telegram','Request timed out — server waking up, try again in 30 sec');
  }
}
// ─── TELEGRAM ALERTS ───
async function tgAlert(msg){
  try{ await fetch('/notify?msg='+encodeURIComponent(msg)); }catch(e){}
}

// ─── CLOCK ───
function tick(){
  const now=new Date();
  document.getElementById('clk').textContent=now.toLocaleTimeString('en-US',{hour:'2-digit',minute:'2-digit',second:'2-digit',timeZone:'America/New_York'})+' ET';
  const et=now.toLocaleString('en-US',{hour:'2-digit',minute:'2-digit',hour12:false,timeZone:'America/New_York'});
  const[h,m]=et.split(':').map(Number),mins=h*60+m;
  const b=document.getElementById('mbadge'),l=document.getElementById('mlbl'),d=document.getElementById('ldot');
  if(mins>=570&&mins<960){b.className='mbadge mo';l.textContent='Market Open';d.style.background='#34d399';}
  else if(mins>=240&&mins<570){b.className='mbadge mp';l.textContent='Pre-Market';d.style.background='#fbbf24';}
  else{b.className='mbadge mc';l.textContent='After Hours';d.style.background='#475569';}
}
tick();setInterval(tick,1000);
