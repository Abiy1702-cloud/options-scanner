<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Options Scanner Pro</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#0a0e0d;--bg2:#111714;--bg3:#161c1a;--border:rgba(255,255,255,.07);--border2:rgba(255,255,255,.13);--text:#e2e8f0;--t2:#94a3b8;--t3:#475569;--green:#34d399;--red:#f87171;--amber:#fbbf24;--purple:#a78bfa;--mono:'IBM Plex Mono',monospace}
html,body{height:100%;overflow:hidden}
body{background:var(--bg);color:var(--text);font-family:'Inter',sans-serif;display:flex;flex-direction:column}
/* TOPBAR */
.topbar{background:var(--bg2);border-bottom:1px solid var(--border);padding:0 16px;height:50px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.logo{display:flex;align-items:center;gap:8px}
.logo-box{width:24px;height:24px;background:linear-gradient(135deg,#34d399,#059669);border-radius:5px;display:flex;align-items:center;justify-content:center}
.logo-box svg{width:13px;height:13px;fill:#fff}
.logo-text{font-weight:700;font-size:13px}.logo-sub{font-size:9px;color:var(--t3);font-family:var(--mono)}
.tr{display:flex;align-items:center;gap:7px}
.tdisp{font-family:var(--mono);font-size:10px;color:var(--t2);padding:3px 8px;background:var(--bg3);border:1px solid var(--border);border-radius:4px}
.ref-dot{width:6px;height:6px;border-radius:50%;background:var(--t3);flex-shrink:0}
.ref-dot.live{background:var(--green);animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
.mbadge{display:flex;align-items:center;gap:4px;font-family:var(--mono);font-size:9px;padding:3px 9px;border-radius:4px;border:1px solid var(--border)}
.mbadge.mo{background:rgba(52,211,153,.08);border-color:rgba(52,211,153,.3)}.mbadge.mp{background:rgba(251,191,36,.08);border-color:rgba(251,191,36,.3)}.mbadge.mc{background:rgba(71,85,105,.1);border-color:rgba(71,85,105,.25)}
.ldot{width:5px;height:5px;border-radius:50%;background:#475569}
.sbtn{background:var(--green);color:#0a0e0d;border:none;border-radius:5px;padding:6px 13px;font-weight:700;font-size:11px;cursor:pointer;font-family:'Inter',sans-serif;transition:opacity .15s}
.sbtn:hover{opacity:.85}.sbtn:disabled{opacity:.4;cursor:default}
/* TABS */
.mode-tabs{background:var(--bg2);border-bottom:1px solid var(--border);display:flex;padding:0 10px;flex-shrink:0}
.mode-tab{flex:1;background:none;border:none;color:var(--t3);padding:9px 4px;font-size:10px;font-weight:500;cursor:pointer;border-bottom:2px solid transparent;transition:all .18s;font-family:'Inter',sans-serif;display:flex;align-items:center;justify-content:center;gap:4px}
.mode-tab:hover{color:var(--t2)}.mode-tab.active{color:var(--green);border-bottom-color:var(--green)}
.mode-badge{background:var(--bg3);border:1px solid var(--border);border-radius:8px;font-size:8px;font-family:var(--mono);padding:1px 5px;color:var(--t3)}
/* LAYOUT */
.layout{display:flex;flex:1;overflow:hidden;min-height:0}
.sidebar{width:200px;background:var(--bg2);border-right:1px solid var(--border);display:flex;flex-direction:column;flex-shrink:0}
.sbhdr{padding:8px 11px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;flex-shrink:0}
.sbtitle{font-size:10px;font-weight:600}.scnt{font-size:8px;font-family:var(--mono);color:var(--t3)}
#slist{overflow-y:auto;flex:1}
.main{flex:1;overflow-y:auto;padding:14px}
/* SIDEBAR ITEMS */
.sitem{padding:9px 11px;border-bottom:1px solid var(--border);cursor:pointer;transition:background .12s}
.sitem:hover{background:rgba(255,255,255,.02)}.sitem.active{background:rgba(52,211,153,.05);border-left:2px solid var(--green)}.sitem.intrade{background:rgba(52,211,153,.03)}
.srow1{display:flex;justify-content:space-between;align-items:center;margin-bottom:1px}
.stk{font-weight:700;font-size:11px;font-family:var(--mono)}.rnum{font-size:8px;font-family:var(--mono);color:var(--t3)}
.sname{font-size:9px;color:var(--t2);margin-bottom:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.sprow{display:flex;justify-content:space-between;margin-bottom:3px}
.sp{font-family:var(--mono);font-size:11px;font-weight:600}.chg{font-family:var(--mono);font-size:9px}.cu{color:var(--green)}.cd{color:var(--red)}
.swrap{margin-bottom:3px}.stop2{display:flex;justify-content:space-between;font-size:8px;color:var(--t3);font-family:var(--mono);margin-bottom:2px}
.sbar{height:2px;background:var(--bg3);border-radius:2px;overflow:hidden}.sfill{height:100%;border-radius:2px}.sfill-sp{background:linear-gradient(90deg,var(--green),#059669)}.sfill-un{background:linear-gradient(90deg,var(--purple),#7c3aed)}
.tags{display:flex;flex-wrap:wrap;gap:2px;margin-bottom:3px}
.tag{font-size:7px;font-family:var(--mono);padding:1px 4px;border-radius:2px;border:1px solid}
.tbuy{background:rgba(52,211,153,.1);color:var(--green);border-color:rgba(52,211,153,.25)}.twat{background:rgba(251,191,36,.08);color:var(--amber);border-color:rgba(251,191,36,.2)}.tcall{background:rgba(96,165,250,.08);color:#60a5fa;border-color:rgba(96,165,250,.2)}.tflow{background:rgba(167,139,250,.1);color:var(--purple);border-color:rgba(167,139,250,.2)}
.ichk{display:flex;align-items:center;gap:3px;margin-top:2px}.ichk input{accent-color:var(--green);cursor:pointer}.ichk label{font-size:9px;color:var(--t2);cursor:pointer}
.tpill{font-size:8px;font-family:var(--mono);margin-top:2px;font-weight:600}
/* CUSTOM SEARCH IN SIDEBAR */
.cust-search{padding:8px 10px;border-bottom:1px solid var(--border);flex-shrink:0}
.cust-row{display:flex;gap:4px;margin-bottom:6px}
.cust-inp{flex:1;background:var(--bg3);border:1px solid var(--border2);border-radius:4px;padding:5px 8px;color:var(--text);font-family:var(--mono);font-size:11px;outline:none;min-width:0}
.cust-inp:focus{border-color:var(--green)}
.cust-go{background:var(--green);color:#0a0e0d;border:none;border-radius:4px;padding:5px 9px;font-weight:700;font-size:10px;cursor:pointer}
.cust-go:disabled{opacity:.4;cursor:default}
.cust-quick{display:flex;flex-wrap:wrap;gap:2px}
.qbtn{background:var(--bg3);border:1px solid var(--border);border-radius:3px;padding:2px 5px;color:var(--t3);font-family:var(--mono);font-size:8px;cursor:pointer;transition:all .1s}
.qbtn:hover{border-color:var(--green);color:var(--green)}
/* CHART PANEL */
.chdr{margin-bottom:10px}
.ctop{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:2px}
.ctk{font-size:17px;font-weight:700;display:flex;align-items:center;gap:6px}
.cnm{font-size:9px;color:var(--t2)}.cpb{text-align:right}
.cp{font-size:22px;font-weight:700;font-family:var(--mono)}
/* RANGE TABS */
.range-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:6px}
.rtabs{display:flex;gap:1px;background:var(--bg3);border-radius:5px;padding:2px}
.rtab{background:none;border:none;color:var(--t3);font-family:var(--mono);font-size:9px;font-weight:500;padding:3px 9px;border-radius:3px;cursor:pointer;transition:all .12s}
.rtab:hover{color:var(--text)}.rtab.ra{background:var(--bg2);color:var(--green);border:1px solid var(--border2)}
.chart-upd{font-size:8px;color:var(--t3);font-family:var(--mono)}
/* CHART */
.ccanvas{position:relative;height:260px;margin-bottom:10px;background:var(--bg2);border:1px solid var(--border);border-radius:7px;padding:10px}
.legend{display:flex;flex-wrap:wrap;gap:10px;margin-bottom:10px}
.li{display:flex;align-items:center;gap:4px;font-size:9px;color:var(--t2);font-family:var(--mono)}
.ld{width:8px;height:8px;border-radius:2px}
/* ZONES + GRIDS */
.zones{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;margin-bottom:10px}
.zone{background:var(--bg2);border:1px solid var(--border);border-radius:6px;padding:8px 10px}
.ze{border-color:rgba(52,211,153,.25)}.zs{border-color:rgba(248,113,113,.25)}.zst{border-color:rgba(251,191,36,.25)}
.zlbl{font-size:8px;color:var(--t2);font-family:var(--mono);margin-bottom:2px}
.zval{font-size:15px;font-weight:700;font-family:var(--mono)}
.ze .zval{color:var(--green)}.zs .zval{color:var(--red)}.zst .zval{color:var(--amber)}
.ogrid{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;margin-bottom:10px}
.ocard{background:var(--bg2);border:1px solid var(--border);border-radius:6px;padding:8px 10px}
.olbl{font-size:8px;color:var(--t3);font-family:var(--mono);margin-bottom:2px}
.oval{font-size:12px;font-weight:600;font-family:var(--mono)}
.og{color:var(--green)}.ob{color:#60a5fa}.oa{color:var(--amber)}.op{color:var(--purple)}
.flow-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:6px;margin-bottom:10px}
.flow-card{background:var(--bg2);border:1px solid rgba(167,139,250,.2);border-radius:6px;padding:8px 10px}
.flow-lbl{font-size:8px;color:var(--purple);font-family:var(--mono);margin-bottom:2px}
.flow-val{font-size:12px;font-weight:600}
/* WHY SECTION */
.why-box{background:var(--bg2);border:1px solid var(--border2);border-radius:8px;padding:12px 14px;margin-bottom:10px}
.why-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}
.why-title{font-size:11px;font-weight:600;display:flex;align-items:center;gap:6px}
.why-badge-up{background:rgba(52,211,153,.12);color:var(--green);border:1px solid rgba(52,211,153,.3);border-radius:4px;font-size:9px;font-family:var(--mono);padding:2px 7px}
.why-badge-dn{background:rgba(248,113,113,.1);color:var(--red);border:1px solid rgba(248,113,113,.3);border-radius:4px;font-size:9px;font-family:var(--mono);padding:2px 7px}
.why-analysis{font-size:11px;color:var(--t2);line-height:1.75;margin-bottom:8px}
.why-news{border-top:1px solid var(--border);padding-top:8px}
.why-news-title{font-size:9px;font-family:var(--mono);color:var(--t3);margin-bottom:5px;text-transform:uppercase;letter-spacing:.05em}
.news-hl{display:flex;align-items:flex-start;gap:6px;margin-bottom:5px;font-size:10px;color:var(--t2);line-height:1.5}
.news-hl-dot{color:var(--green);flex-shrink:0;font-size:8px;margin-top:3px}
.news-loading{font-size:10px;font-family:var(--mono);color:var(--t3)}
/* TRADE BOXES */
.abox{background:var(--bg2);border:1px solid var(--border);border-radius:7px;padding:10px 12px;font-size:10px;color:var(--t2);line-height:1.75;margin-bottom:10px}
.tbox{background:rgba(52,211,153,.04);border:1px solid rgba(52,211,153,.15);border-radius:7px;padding:10px 12px;display:flex;align-items:center;gap:8px;margin-bottom:10px}
.tbox input{accent-color:var(--green);width:14px;height:14px;cursor:pointer}.tbox label{font-size:11px;font-weight:500;cursor:pointer}
/* SIGNAL */
.sig-bar{border-radius:8px;padding:12px 14px;margin-bottom:10px;border:1.5px solid}
.sig-hold{background:rgba(52,211,153,.04);border-color:rgba(52,211,153,.22)}
.sig-sell-stop{background:rgba(248,113,113,.08);border-color:var(--red)}
.sig-sell-profit{background:rgba(52,211,153,.08);border-color:var(--green)}
.sig-top{display:flex;align-items:center;gap:8px;margin-bottom:5px}
.sig-lbl{font-size:17px;font-weight:700;font-family:var(--mono)}
.sig-sub{font-size:9px;font-family:var(--mono);color:var(--t2);letter-spacing:.06em;text-transform:uppercase}
.sig-pnl{margin-left:auto;font-size:19px;font-weight:700;font-family:var(--mono)}
.sig-det{font-size:11px;color:var(--t2);font-family:var(--mono);line-height:1.7;margin-bottom:3px}
.sig-upd{font-size:9px;color:var(--t3);font-family:var(--mono)}
@keyframes blink-bad{0%,100%{opacity:1}50%{opacity:.08}}
@keyframes blink-good{0%,100%{opacity:1}50%{opacity:.25}}
.blink-bad{animation:blink-bad .7s infinite;color:var(--red)!important}
.blink-good{animation:blink-good 1.1s infinite;color:var(--green)!important}
/* ROCKET */
.rocket-tag{background:rgba(251,191,36,.12);color:var(--amber);border:1px solid rgba(251,191,36,.25);border-radius:3px;font-size:8px;font-family:var(--mono);padding:2px 5px}
.pot-bar{background:var(--bg3);border-radius:2px;height:2px;margin-top:3px;overflow:hidden}
.pot-fill{background:linear-gradient(90deg,var(--amber),#f97316);height:2px;border-radius:2px}
/* LOADING */
.lov{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;gap:10px;color:var(--t2)}
.spin{width:26px;height:26px;border:2px solid var(--border);border-top-color:var(--green);border-radius:50%;animation:spin .8s linear infinite}
.lmsg{font-size:11px;font-family:var(--mono)}
@keyframes spin{to{transform:rotate(360deg)}}
.errmsg{background:rgba(248,113,113,.08);border:1px solid rgba(248,113,113,.25);border-radius:7px;padding:12px;font-size:11px;color:var(--red);margin:14px;line-height:1.9}
.src-note{font-size:8px;font-family:var(--mono);color:var(--t3);margin-bottom:6px}
/* ALERT */
.abanner{position:fixed;bottom:42px;right:14px;background:var(--bg2);border:1px solid var(--green);border-radius:7px;padding:9px 26px 9px 11px;max-width:270px;z-index:999;animation:slin .25s ease}
@keyframes slin{from{transform:translateX(14px);opacity:0}to{transform:translateX(0);opacity:1}}
.abtitle{font-weight:600;color:var(--green);margin-bottom:1px;font-family:var(--mono);font-size:10px}
.aclose{position:absolute;top:5px;right:7px;background:none;border:none;color:var(--t3);cursor:pointer;font-size:13px}
/* MARKET BAR */
.market-bar{height:34px;background:var(--bg2);border-top:1px solid var(--border);display:flex;align-items:center;flex-shrink:0;overflow:hidden;z-index:50}
.mkt-sect{display:flex;align-items:center;gap:0;flex-shrink:0;border-right:1px solid var(--border);height:100%;padding:0 12px;gap:5px}
.mkt-lbl{font-family:var(--mono);font-size:9px;font-weight:700;color:var(--t3)}
.mkt-price{font-family:var(--mono);font-size:11px;font-weight:700}
.mkt-sig{font-family:var(--mono);font-size:8px;padding:2px 6px;border-radius:3px;font-weight:600;border:1px solid}
.mkt-bull{background:rgba(52,211,153,.1);color:var(--green);border-color:rgba(52,211,153,.3)}
.mkt-bear{background:rgba(248,113,113,.08);color:var(--red);border-color:rgba(248,113,113,.3)}
.mkt-flat{background:rgba(251,191,36,.07);color:var(--amber);border-color:rgba(251,191,36,.25)}
.mkt-ts{font-family:var(--mono);font-size:8px;color:var(--t3);padding:0 8px;flex-shrink:0;border-right:1px solid var(--border)}
.news-wrap{flex:1;overflow:hidden;position:relative;height:100%;-webkit-mask-image:linear-gradient(90deg,transparent 0px,black 30px,black calc(100% - 30px),transparent);mask-image:linear-gradient(90deg,transparent 0px,black 30px,black calc(100% - 30px),transparent)}
.news-track{display:flex;align-items:center;height:100%;white-space:nowrap;animation:scroll-left 80s linear infinite}
.news-track:hover{animation-play-state:paused}
@keyframes scroll-left{0%{transform:translateX(100vw)}100%{transform:translateX(-200%)}}
.news-item{display:inline-flex;align-items:center;gap:6px;padding:0 18px;font-size:9px;font-family:var(--mono);color:var(--t2)}
.news-sym{font-weight:600}.news-sep{color:var(--t3)}
</style>
</head>
<body>

<!-- TOPBAR -->
<div class="topbar">
  <div class="logo">
    <div class="logo-box"><svg viewBox="0 0 24 24"><path d="M3 3h7v7H3zM14 3h7v7h-7zM14 14h7v7h-7zM3 14h7v7H3z"/></svg></div>
    <div><div class="logo-text">Options Scanner Pro</div><div class="logo-sub">Abiy Kassa · St Louis MO</div></div>
  </div>
  <div class="tr">
    <div class="tdisp" id="clk">—</div>
    <div class="tdisp" id="last-refresh" style="display:none">
      <div class="ref-dot" id="ref-dot"></div><span id="ref-txt">—</span>
    </div>
    <div class="mbadge mp" id="mbadge"><span class="ldot" id="ldot"></span><span id="mlbl">Loading</span></div>
    <button class="sbtn" id="scanBtn" onclick="runScan()">▶ Scan Morning Picks</button>
  </div>
</div>

<!-- TABS -->
<div class="mode-tabs">
  <button class="mode-tab active" id="tab-sp"     onclick="switchMode('sp',this)">📊 S&amp;P 500 <span class="mode-badge" id="badge-sp">—</span></button>
  <button class="mode-tab"        id="tab-uf"     onclick="switchMode('uf',this)">⚡ Flow <span class="mode-badge" id="badge-uf">—</span></button>
  <button class="mode-tab"        id="tab-rocket" onclick="switchMode('rocket',this)">🚀 Rockets <span class="mode-badge" id="badge-rocket">—</span></button>
  <button class="mode-tab"        id="tab-custom" onclick="switchMode('custom',this)">🔍 Custom <span class="mode-badge" id="badge-custom">NEW</span></button>
</div>

<!-- LAYOUT -->
<div class="layout">
  <div class="sidebar">
    <div class="sbhdr"><span class="sbtitle" id="sideTitle">S&amp;P 500 Picks</span><span class="scnt" id="scnt">Not scanned</span></div>
    <div id="custom-search-bar" style="display:none" class="cust-search">
      <div class="cust-row">
        <input id="custom-input" class="cust-inp" type="text" placeholder="Ticker..." onkeydown="if(event.key==='Enter')lookupCustom()">
        <button class="cust-go" id="lookup-btn" onclick="lookupCustom()">Go</button>
      </div>
      <div class="cust-quick">
        <button class="qbtn" onclick="quickL('NVDA')">NVDA</button><button class="qbtn" onclick="quickL('AAPL')">AAPL</button>
        <button class="qbtn" onclick="quickL('TSLA')">TSLA</button><button class="qbtn" onclick="quickL('META')">META</button>
        <button class="qbtn" onclick="quickL('MSFT')">MSFT</button><button class="qbtn" onclick="quickL('COIN')">COIN</button>
        <button class="qbtn" onclick="quickL('SPY')">SPY</button><button class="qbtn" onclick="quickL('QQQ')">QQQ</button>
        <button class="qbtn" onclick="quickL('PLTR')">PLTR</button><button class="qbtn" onclick="quickL('ARM')">ARM</button>
        <button class="qbtn" onclick="quickL('MSTR')">MSTR</button><button class="qbtn" onclick="quickL('SOXL')">SOXL</button>
      </div>
    </div>
    <div id="slist"><div style="padding:16px;text-align:center;color:var(--t3);font-size:11px;line-height:2">Hit <strong style="color:var(--green)">Scan Morning Picks</strong><br>to load live data</div></div>
  </div>
  <div class="main" id="mpanel">
    <div class="lov"><div style="font-size:40px">⬡</div><div style="font-size:13px;color:var(--t2)">Ready to scan</div><div style="font-size:10px;font-family:var(--mono);color:var(--t3);margin-top:4px">Click Scan Morning Picks — prices refresh every 30 sec automatically</div></div>
  </div>
</div>

<!-- MARKET BAR -->
<div class="market-bar">
  <div class="mkt-sect">
    <span class="mkt-lbl">SPY</span>
    <span class="mkt-price" id="spy-price" style="color:var(--green)">—</span>
    <span class="chg" id="spy-chg">—</span>
    <span class="mkt-sig mkt-flat" id="spy-sig">—</span>
  </div>
  <div class="mkt-sect">
    <span class="mkt-lbl">QQQ</span>
    <span class="mkt-price" id="qqq-price" style="color:var(--green)">—</span>
    <span class="chg" id="qqq-chg">—</span>
    <span class="mkt-sig mkt-flat" id="qqq-sig">—</span>
  </div>
  <div class="mkt-ts" id="mkt-ts">—</div>
  <div class="news-wrap"><div class="news-track" id="news-track">
    <span class="news-item"><span class="news-sep">●</span> Loading market news — please wait a moment...</span>
  </div></div>
</div>

<!-- ALERT -->
<div id="abanner" style="display:none" class="abanner">
  <button class="aclose" onclick="document.getElementById('abanner').style.display='none'">✕</button>
  <div class="abtitle" id="atitle">Signal</div>
  <div id="abody" style="color:var(--t2);font-size:10px"></div>
</div>

<script>
// ─────────────────────────────────────────────
// WATCHLISTS

// ─── SCORING ───
function scoreStock(q){let s=50;const c=q.regularMarketChangePercent||0;if(c>3)s+=18;else if(c>2)s+=13;else if(c>1)s+=8;else if(c<-1)s-=10;const vr=(q.regularMarketVolume||0)/(q.averageDailyVolume3Month||1);if(vr>3)s+=18;else if(vr>2)s+=12;else if(vr>1.3)s+=7;const mc=q.marketCap||0;if(mc>500e9)s+=8;else if(mc>100e9)s+=5;const p=q.regularMarketPrice||0,hi=q.fiftyTwoWeekHigh||p;if(p/hi>0.92)s+=8;else if(p/hi>0.78)s+=4;return Math.min(99,Math.max(38,Math.round(s)));}
function scoreUnusual(q){let s=50;const vr=(q.regularMarketVolume||0)/(q.averageDailyVolume3Month||1);if(vr>5)s+=25;else if(vr>3)s+=18;else if(vr>2)s+=12;else if(vr>1.5)s+=6;const c=q.regularMarketChangePercent||0;if(Math.abs(c)>4)s+=15;else if(Math.abs(c)>2)s+=9;else if(Math.abs(c)>1)s+=5;const mc=q.marketCap||0;if(mc<5e9)s+=10;else if(mc<20e9)s+=6;return Math.min(99,Math.max(38,Math.round(s)));}
function scoreRocket(q){const p=q.regularMarketPrice||0,mc=q.marketCap||0;if(p<5||mc<500e6)return 0;let s=50;const c=q.regularMarketChangePercent||0;if(c>10)s+=28;else if(c>7)s+=22;else if(c>5)s+=16;else if(c>3)s+=10;else if(c>1)s+=5;else if(c<0)s-=18;const vr=(q.regularMarketVolume||0)/(q.averageDailyVolume3Month||1);if(vr>5)s+=22;else if(vr>3)s+=15;else if(vr>2)s+=9;else if(vr>1.5)s+=4;else s-=8;const hi=q.fiftyTwoWeekHigh||p,gap=(hi-p)/hi;if(gap>0.30)s+=14;else if(gap>0.15)s+=7;else s-=5;if(mc>5e9&&mc<200e9)s+=8;return Math.min(99,Math.max(0,Math.round(s)));}

// ─── OPTION PARAMS ───
function nxtFri(min){const d=new Date();d.setHours(0,0,0,0);d.setDate(d.getDate()+Math.max(min,7));while(d.getDay()!==5)d.setDate(d.getDate()+1);return d;}
function otmS(p){let i=p<25?1:p<100?1:p<250?5:p<500?5:10;return Math.ceil(p*1.005/i)*i;}
function estPrem(p,dte,iv){return Math.max(0.05,(p*iv*Math.sqrt(dte/365)*0.4)).toFixed(2);}
function optP(tk,p,mode){const m=mode==='sp'?(SP_META[tk]||{dte:25,r:'Momentum and technicals align for near-term move.'}):(UF_META[tk]||{dte:14,r:'Unusual options flow — elevated volume signals directional positioning.'});const exp=nxtFri(m.dte),s=otmS(p),dte=Math.max(1,Math.round((exp-new Date())/864e5)),es=exp.toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'}),iv=mode==='uf'?0.65:0.38;return {strike:s,expiryStr:es,dte,type:'CALL',prem:estPrem(p,dte,iv),r:m.r};}
function optPR(t,p){const exp=nxtFri(14),s=otmS(p),dte=Math.max(1,Math.round((exp-new Date())/864e5)),es=exp.toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'});return {strike:s,expiryStr:es,dte,type:'CALL',prem:estPrem(p,dte,0.72),r:'High-momentum rocket — aggressive short-term CALL for 20%+ move. High IV = higher premium. Honor the -7% stop strictly.'};}
function optPC(t,p){const exp=nxtFri(21),s=otmS(p),dte=Math.max(1,Math.round((exp-new Date())/864e5)),es=exp.toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'});return {strike:s,expiryStr:es,dte,type:'CALL',prem:estPrem(p,dte,0.45),r:'Custom lookup — entry, target, and stop based on current price action and standard risk/reward levels.'};}

async function yFetch(syms){const r=await fetch('/quotes?symbols='+syms.join(','));if(!r.ok)throw new Error('Server error '+r.status+' — is server.py running?');return (await r.json()).result||[];}
async function priceFetch(syms){try{const r=await fetch('/prices?symbols='+syms.join(','));if(!r.ok)return[];return (await r.json()).result||[];}catch(e){return[];}}
async function fetchHist(ticker,period,interval){try{const r=await fetch('/history?symbol='+ticker+'&period='+period+'&interval='+interval);if(!r.ok)return[];const d=await r.json();const ch=d&&d.chart&&d.chart.result&&d.chart.result[0];if(!ch)return[];const ts=ch.timestamp||[],cl=(ch.indicators&&ch.indicators.quote&&ch.indicators.quote[0]&&ch.indicators.quote[0].close)||[];const lbls=ch.labels||ts.map(t=>new Date(t*1000).toLocaleDateString('en-US',{month:'short',day:'numeric'}));return ts.map((t,i)=>({date:lbls[i],close:cl[i]||null})).filter(x=>x.close);}catch(e){return[];}}
async function fetchStockNews(ticker){try{const r=await fetch('/stock-news?symbol='+ticker);if(!r.ok)return[];return (await r.json()).items||[];}catch(e){return[];}}

// ─── WHY ANALYSIS ───
function generateWhy(s){
  const c=s.regularMarketChangePercent||0,p=s.regularMarketPrice||0,vr=s._vr||0,hi=s.fiftyTwoWeekHigh||p,mc=s.marketCap||0;
  const pctFromHi=((hi-p)/hi*100).toFixed(1);
  const parts=[];
  if(c>5)parts.push(`Strong +${c.toFixed(2)}% surge today — institutional buying pressure and breakout momentum detected.`);
  else if(c>2)parts.push(`${c.toFixed(2)}% gain today indicates positive momentum building above key support.`);
  else if(c>0.3)parts.push(`Modest +${c.toFixed(2)}% move — price holding constructive above support levels.`);
  else if(c<-3)parts.push(`Down ${Math.abs(c).toFixed(2)}% — selling pressure active; wait for support confirmation before positioning.`);
  else if(c<-0.5)parts.push(`-${Math.abs(c).toFixed(2)}% pullback — potential entry opportunity forming near the entry zone below.`);
  else parts.push(`Relatively flat today — consolidating near recent levels.`);
  if(vr>3)parts.push(`Volume running ${vr}x above average — unusual institutional activity confirms the price move.`);
  else if(vr>1.8)parts.push(`Elevated volume at ${vr}x normal confirms the directional move.`);
  if(pctFromHi<5)parts.push(`At 52-week high territory ($${hi.toFixed(2)}) — strong relative strength vs peers.`);
  else if(pctFromHi<20)parts.push(`${pctFromHi}% below 52-week high of $${hi.toFixed(2)} — recovery potential still available.`);
  else parts.push(`${pctFromHi}% below 52-week high of $${hi.toFixed(2)} — significant room for recovery if fundamentals hold.`);
  if(mc>500e9)parts.push(`Mega-cap with $${fmtBig(mc)} market cap — lower volatility, institutional-grade liquidity.`);
  else if(mc>50e9)parts.push(`Large-cap ($${fmtBig(mc)}) with strong institutional participation.`);
  return parts.join(' ');
}

// ─── MAIN SCAN ───
async function runScan(){
  const btn=document.getElementById('scanBtn');btn.disabled=true;
  const msgs=['Fetching prices...','Scoring picks...','Detecting flow...','Finding rockets...','Building signals...'];
  let mi=0;const iv=setInterval(()=>{btn.textContent=msgs[mi++%msgs.length];},700);
  document.getElementById('mpanel').innerHTML='<div class="lov"><div class="spin"></div><div class="lmsg">Scanning market data...</div></div>';
  try{
    // Parallel fetch all 3 lists simultaneously
    const [spQ,ufQ,rktQ]=await Promise.all([yFetch(SP500_LIST),yFetch(UNUSUAL_LIST),yFetch(ROCKET_LIST)]);
    if(!spQ.length&&!ufQ.length)throw new Error('No data returned. Make sure server.py is running in Command Prompt.');
    spPicks=spQ.filter(q=>q.regularMarketPrice>0).map(q=>({...q,_score:scoreStock(q),_mode:'sp',_op:optP(q.symbol,q.regularMarketPrice,'sp'),_entry:+(q.regularMarketPrice*0.995).toFixed(2),_target:+(q.regularMarketPrice*1.072).toFixed(2),_stop:+(q.regularMarketPrice*0.962).toFixed(2),_vr:+((q.regularMarketVolume||0)/(q.averageDailyVolume3Month||1)).toFixed(1)})).sort((a,b)=>b._score-a._score).slice(0,5);
    ufPicks=ufQ.filter(q=>q.regularMarketPrice>0).map(q=>({...q,_score:scoreUnusual(q),_mode:'uf',_op:optP(q.symbol,q.regularMarketPrice,'uf'),_entry:+(q.regularMarketPrice*0.998).toFixed(2),_target:+(q.regularMarketPrice*1.08).toFixed(2),_stop:+(q.regularMarketPrice*0.955).toFixed(2),_vr:+((q.regularMarketVolume||0)/(q.averageDailyVolume3Month||1)).toFixed(1)})).sort((a,b)=>b._score-a._score).slice(0,5);
    rocketPicks=rktQ.filter(q=>scoreRocket(q)>0&&q.regularMarketPrice>=5).map(q=>({...q,_score:scoreRocket(q),_mode:'rocket',_op:optPR(q.symbol,q.regularMarketPrice),_entry:+(q.regularMarketPrice*0.997).toFixed(2),_target:+(q.regularMarketPrice*1.20).toFixed(2),_stop:+(q.regularMarketPrice*0.93).toFixed(2),_vr:+((q.regularMarketVolume||0)/(q.averageDailyVolume3Month||1)).toFixed(1)})).sort((a,b)=>b._score-a._score).slice(0,3);
    scanned=true;
    document.getElementById('badge-sp').textContent=spPicks.length;
    document.getElementById('badge-uf').textContent=ufPicks.length;
    document.getElementById('badge-rocket').textContent=rocketPicks.length;
    document.getElementById('scnt').textContent=(spQ.length+ufQ.length)+' scanned';
    const picks=selMode==='rocket'?rocketPicks:selMode==='uf'?ufPicks:spPicks;
    if(selMode==='custom'){renderCustomSidebar();}
    else if(selMode==='rocket'){renderRocketSidebar();if(rocketPicks.length)selectStock(rocketPicks[0].symbol,'rocket');}
    else{renderSidebar();if(picks.length){selectStock(picks[0].symbol,selMode);showAlert(picks[0].symbol,'#1 pick · Score '+picks[0]._score+'/100');}}
    startAutoRefresh();
  }catch(e){
    document.getElementById('mpanel').innerHTML='<div class="errmsg"><strong>Scan failed:</strong> '+e.message+'</div>';
    document.getElementById('slist').innerHTML='<div style="padding:12px;color:var(--red);font-size:10px;font-family:var(--mono)">Error: '+e.message+'</div>';
  }
  clearInterval(iv);btn.disabled=false;btn.innerHTML='▶ Rescan';
}

// ─── MODE SWITCH ───
function switchMode(mode,el){
  selMode=mode;
  document.querySelectorAll('.mode-tab').forEach(t=>t.classList.remove('active'));el.classList.add('active');
  document.getElementById('custom-search-bar').style.display=mode==='custom'?'block':'none';
  if(mode==='rocket'){
    document.getElementById('sideTitle').textContent='🚀 Daily Rockets';
    renderRocketSidebar();
    if(rocketPicks.length)selectStock(rocketPicks[0].symbol,'rocket');
    else document.getElementById('mpanel').innerHTML='<div class="lov"><div style="font-size:36px">🚀</div><div style="font-size:13px;color:var(--t2)">Hit Scan to find rockets</div></div>';
    return;
  }
  if(mode==='custom'){
    document.getElementById('sideTitle').textContent='Custom Lookup';
    renderCustomSidebar();
    const last=Object.keys(customStocks).pop();
    if(last)selectStock(last,'custom');
    else document.getElementById('mpanel').innerHTML='<div class="lov"><div style="font-size:36px">🔍</div><div style="font-size:13px;color:var(--t2)">Enter a ticker in the sidebar</div></div>';
    return;
  }
  document.getElementById('sideTitle').textContent=mode==='sp'?'S&P 500 Picks':'Unusual Flow';
  if(scanned){renderSidebar();const picks=mode==='sp'?spPicks:ufPicks;if(picks.length)selectStock(picks[0].symbol,mode);}
}

// ─── CHART PLUGINS ───
function h2r(hex,a){const r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);return 'rgba('+r+','+g+','+b+','+a+')';}
function rr(ctx,x,y,w,h,r){ctx.beginPath();ctx.moveTo(x+r,y);ctx.lineTo(x+w-r,y);ctx.arcTo(x+w,y,x+w,y+r,r);ctx.lineTo(x+w,y+h-r);ctx.arcTo(x+w,y+h,x+w-r,y+h,r);ctx.lineTo(x+r,y+h);ctx.arcTo(x,y+h,x,y+h-r,r);ctx.lineTo(x,y+r);ctx.arcTo(x,y,x+r,y,r);ctx.closePath();}
const plPlugin={id:'pl',afterDraw(chart){
  const cfg=chart.options.plugins.pl;if(!cfg)return;
  const{ctx,chartArea:{left,right,top,bottom},scales:{y:yS}}=chart;
  [{v:cfg.entry,color:'#34d399',lbl:'▲ ENTRY  $'+cfg.entry},{v:cfg.target,color:'#f87171',lbl:'▶ TARGET $'+cfg.target},{v:cfg.stop,color:'#fbbf24',lbl:'■ STOP   $'+cfg.stop}].forEach(({v,color,lbl})=>{
    const y=yS.getPixelForValue(v);if(y<top-2||y>bottom+2)return;
    ctx.save();ctx.beginPath();ctx.setLineDash([4,5]);ctx.strokeStyle=color;ctx.lineWidth=1;ctx.globalAlpha=.5;ctx.moveTo(left,y);ctx.lineTo(right-110,y);ctx.stroke();
    ctx.setLineDash([]);ctx.globalAlpha=1;ctx.font='600 9px IBM Plex Mono,monospace';const tw=ctx.measureText(lbl).width,px=right-tw-12;

// ─── CHART RANGE ───
async function setRange(range){
  currentRange=range;
  document.querySelectorAll('.rtab').forEach(b=>b.classList.remove('ra'));
  const idx=['1D','1W','1M','1Y','5Y'].indexOf(range);

// ─── TRADE SIGNAL ───
function buildSig(ticker,s,t){
  const pnl=parseFloat(t.pnl||0),ps=(pnl>=0?'+':'')+pnl.toFixed(2)+'%',cur=(t.currentPrice||t.entry).toFixed(2),chk=t.lastCheck||'—';
  if(t.status==='sell-stop')return '<div class="sig-bar sig-sell-stop"><div class="sig-top"><span class="sig-lbl blink-bad">🛑 SELL</span><span class="sig-sub">STOP HIT — EXIT NOW</span><span class="sig-pnl" style="color:var(--red)">'+ps+'</span></div><div class="sig-det">Entry $'+t.entry+' · Now <strong style="color:var(--red)">$'+cur+'</strong> · Stop $'+s._stop+' breached</div><div class="sig-upd">● Live · last check '+chk+' · every 30 sec</div></div>';
  if(t.status==='sell-target')return '<div class="sig-bar sig-sell-profit"><div class="sig-top"><span class="sig-lbl blink-good">🎯 SELL</span><span class="sig-sub">TARGET REACHED — TAKE PROFIT</span><span class="sig-pnl" style="color:var(--green)">'+ps+'</span></div><div class="sig-det">Entry $'+t.entry+' · Now <strong style="color:var(--green)">$'+cur+'</strong> · Target $'+s._target+' ✓</div><div class="sig-upd">● Live · last check '+chk+' · every 30 sec</div></div>';
  return '<div class="sig-bar sig-hold"><div class="sig-top"><span class="sig-lbl" style="color:var(--green)">✓ HOLD</span><span class="sig-sub">POSITION IN RANGE</span><span class="sig-pnl" style="color:'+(pnl>=0?'var(--green)':'var(--red)')+'">'+ps+'</span></div><div class="sig-det">Entry $'+t.entry+' · Now <strong style="color:'+(pnl>=0?'var(--green)':'var(--amber)')+'">$'+cur+'</strong> · <span style="color:var(--green)">Target $'+s._target+'</span> · <span style="color:var(--amber)">Stop $'+s._stop+'</span></div><div class="sig-upd">● Live · last check '+chk+' · every 30 sec</div></div>';
}

// ─── TRADE TRACKING ───
function toggleTrade(ticker,mode,checked){
  const allP=mode==='custom'?Object.values(customStocks):mode==='rocket'?rocketPicks:mode==='sp'?spPicks:ufPicks;
  const s=allP.find(x=>x.symbol===ticker);if(!s)return;
  if(checked){trades[ticker]={entry:s._entry,time:new Date().toLocaleTimeString(),mode,status:'hold',pnl:'0.00',currentPrice:s._entry,lastCheck:'just opened'};showAlert(ticker,'Tracking · Entry $'+s._entry+' · Target $'+s._target+' · Stop $'+s._stop);startAutoRefresh();}
  else delete trades[ticker];
  if(mode==='custom')renderCustomSidebar();else if(mode==='rocket')renderRocketSidebar();else renderSidebar();
  if(selTicker===ticker)selectStock(ticker,mode);
}

// ─── AUTO-REFRESH 30 sec (fast /prices endpoint) ───
function startAutoRefresh(){
  if(autoRefreshTimer)return;
  autoRefreshTimer=setInterval(doRefresh,30000);
  const d=document.getElementById('ref-dot'),t=document.getElementById('ref-txt'),lr=document.getElementById('last-refresh');
  if(lr)lr.style.display='';
  if(d)d.classList.add('live');
  if(t)t.textContent='Auto-refresh ON';
}
async function doRefresh(){
  const allSyms=[...new Set([...spPicks.map(s=>s.symbol),...ufPicks.map(s=>s.symbol),...rocketPicks.map(s=>s.symbol),...Object.keys(customStocks),...Object.keys(trades)])];
  if(!allSyms.length)return;
  const d=document.getElementById('ref-dot');if(d)d.style.background='var(--amber)';
  const quotes=await priceFetch(allSyms);// FAST endpoint
  if(!quotes.length){if(d)d.style.background='var(--red)';setTimeout(()=>{if(d)d.classList.contains('live')&&(d.style.background='');},3000);return;}
  // Update prices in picks (no re-rank)
  quotes.forEach(q=>{
    [spPicks,ufPicks,rocketPicks].forEach(arr=>{const i=arr.findIndex(s=>s.symbol===q.symbol);if(i>=0){arr[i].regularMarketPrice=q.regularMarketPrice;arr[i].regularMarketChangePercent=q.regularMarketChangePercent;arr[i].regularMarketVolume=q.regularMarketVolume;arr[i]._vr=+((q.regularMarketVolume||0)/(arr[i].averageDailyVolume3Month||1)).toFixed(1);}});
    if(customStocks[q.symbol]){customStocks[q.symbol].regularMarketPrice=q.regularMarketPrice;customStocks[q.symbol].regularMarketChangePercent=q.regularMarketChangePercent;customStocks[q.symbol].regularMarketVolume=q.regularMarketVolume;}
  });
  updateTrades(quotes);
  if(selMode==='custom')renderCustomSidebar();else if(selMode==='rocket')renderRocketSidebar();else renderSidebar();
  updateLivePrice();
  // Live chart update
  if(selTicker&&activeChart){
    if(currentRange==='1D'||currentRange==='1W'){
      const h2=await fetchHist(selTicker,RANGES[currentRange].period,RANGES[currentRange].interval);
      if(h2.length){activeChart.data.labels=h2.map(h=>h.date);activeChart.data.datasets[0].data=h2.map(h=>h.close);activeChart.update('none');}
    } else {
      const allP=[...spPicks,...ufPicks,...rocketPicks,...Object.values(customStocks)],s=allP.find(x=>x.symbol===selTicker);
      if(s&&activeChart.data.datasets[0].data.length){const len=activeChart.data.datasets[0].data.length;activeChart.data.datasets[0].data[len-1]=s.regularMarketPrice;activeChart.update('none');}
    }
  }
  const ts=new Date().toLocaleTimeString('en-US',{hour:'2-digit',minute:'2-digit',second:'2-digit',timeZone:'America/New_York'});
  const t=document.getElementById('ref-txt');if(t)t.textContent='↻ '+ts+' ET';
  if(d)d.style.background='';d?.classList.contains('live')&&(d.style.background='');if(d)d.classList.add('live');
}
function updateLivePrice(){
  if(!selTicker)return;
  const allP=[...spPicks,...ufPicks,...rocketPicks,...Object.values(customStocks)],s=allP.find(x=>x.symbol===selTicker);if(!s)return;
  const pe=document.getElementById('live-price'),ce=document.getElementById('live-chg');
  if(pe)pe.textContent='$'+(s.regularMarketPrice||0).toFixed(2);
  if(ce){const chg=s.regularMarketChangePercent||0;ce.textContent=(chg>=0?'+':'')+chg.toFixed(2)+'% today';ce.className='chg '+(chg>=0?'cu':'cd');}
}
function updateTrades(quotes){
  quotes.forEach(q=>{
    const t=trades[q.symbol];if(!t)return;
    const price=q.regularMarketPrice,allP=[...spPicks,...ufPicks,...rocketPicks,...Object.values(customStocks)],s=allP.find(x=>x.symbol===q.symbol);if(!s)return;
    const pnl=((price-t.entry)/t.entry*100).toFixed(2);
    trades[q.symbol].currentPrice=price;trades[q.symbol].pnl=pnl;trades[q.symbol].lastCheck=new Date().toLocaleTimeString();
    const prev=t.status;
    if(price>=s._target){trades[q.symbol].status='sell-target';if(prev!=='sell-target')showAlert(q.symbol,'🎯 SELL — Target reached! $'+price.toFixed(2)+' P&L: +'+pnl+'%');}
    else if(price<=s._stop){trades[q.symbol].status='sell-stop';if(prev!=='sell-stop')showAlert(q.symbol,'🛑 SELL — Stop hit! $'+price.toFixed(2)+' P&L: '+pnl+'%');}
    else trades[q.symbol].status='hold';
  });
  if(selTicker&&trades[selTicker]){const el=document.getElementById('sig-outer'),allP=[...spPicks,...ufPicks,...rocketPicks,...Object.values(customStocks)],s=allP.find(x=>x.symbol===selTicker);if(el&&s)el.innerHTML=buildSig(selTicker,s,trades[selTicker]);}
}

// ─── CUSTOM LOOKUP ───
async function lookupCustom(){
  const inp=document.getElementById('custom-input');if(!inp)return;
  const sym=inp.value.trim().toUpperCase().replace(/[^A-Z.]/g,'');if(!sym){inp.focus();return;}
  const btn=document.getElementById('lookup-btn');if(btn){btn.disabled=true;btn.textContent='...';}
  document.getElementById('mpanel').innerHTML='<div class="lov"><div class="spin"></div><div class="lmsg">Fetching '+sym+'...</div></div>';
  try{
    const quotes=await yFetch([sym]);
    if(!quotes.length||!(quotes[0].regularMarketPrice>0))throw new Error('No data for '+sym+'. Check the ticker symbol.');
    const q=quotes[0],s={...q,_score:scoreStock(q),_mode:'custom',_op:optPC(q.symbol,q.regularMarketPrice),_entry:+(q.regularMarketPrice*0.995).toFixed(2),_target:+(q.regularMarketPrice*1.07).toFixed(2),_stop:+(q.regularMarketPrice*0.962).toFixed(2),_vr:+((q.regularMarketVolume||0)/(q.averageDailyVolume3Month||1)).toFixed(1)};
    customStocks[sym]=s;selTicker=sym;selMode='custom';
    renderCustomSidebar();inp.value='';await selectStock(sym,'custom');
  }catch(e){document.getElementById('mpanel').innerHTML='<div class="errmsg"><strong>Lookup failed:</strong> '+e.message+'</div>';}
  if(btn){btn.disabled=false;btn.textContent='Go';}
}
function quickL(sym){const inp=document.getElementById('custom-input');if(inp)inp.value=sym;lookupCustom();}

// ─── MARKET BAR — SPY/QQQ every 15 sec ───

    const data=(await(await fetch('/market')).json()).result||[];

      const sl=q.symbol.toLowerCase(),chg=q.change||0;

async function loadNews(){
  try{
    const items=(await(await fetch('/news')).json()).items||[];
    if(!items.length)return;
    const track=document.getElementById('news-track');if(!track)return;
    const html=items.map(n=>'<span class="news-item">'+(n.symbol?'<span class="news-sym">'+n.symbol+'</span><span class="news-sep">·</span>':'')+n.title+' <span class="news-sep">&nbsp;|&nbsp;</span></span>').join('');

    const dur=Math.max(60,items.length*7)+'s';

refreshMarket();loadNews();
setInterval(refreshMarket,15000);
setInterval(loadNews,3*60000);

// ─── HELPERS ───
function showAlert(ticker,msg){document.getElementById('atitle').textContent=ticker+' — Signal';document.getElementById('abody').textContent=msg;const b=document.getElementById('abanner');b.style.display='block';setTimeout(()=>{b.style.display='none';},6000);}
function genFake(cur,n){const a=[];let p=cur*0.9;for(let i=0;i<n;i++){p+=(Math.random()-.45)*p*.02;a.push(+p.toFixed(2));}a[a.length-1]=cur;return a;}
function makeDates(n){return Array.from({length:n},(_,i)=>{const d=new Date();d.setDate(d.getDate()-n+1+i);return d.toLocaleDateString('en-US',{month:'short',day:'numeric'});});}
function fmtBig(n){if(n>=1e12)return(n/1e12).toFixed(1)+'T';if(n>=1e9)return(n/1e9).toFixed(1)+'B';if(n>=1e6)return(n/1e6).toFixed(0)+'M';return n;}

// ─── CLOCK ───
function tick(){
  const now=new Date();
  document.getElementById('clk').textContent=now.toLocaleTimeString('en-US',{hour:'2-digit',minute:'2-digit',second:'2-digit',timeZone:'America/New_York'})+' ET';
  const et=now.toLocaleString('en-US',{hour:'2-digit',minute:'2-digit',hour12:false,timeZone:'America/New_York'});
  const[h,m]=et.split(':').map(Number),mins=h*60+m;
  const b=document.getElementById('mbadge'),l=document.getElementById('mlbl'),d=document.getElementById('ldot');
  if(mins>=570&&mins<960){b.className='mbadge mo';l.textContent='Market Open';d.style.background='#34d399';}
  else if(mins>=240&&mins<570){b.className='mbadge mp';l.textContent='Pre-Market';d.style.background='#fbbf24';}
  else{b.className='mbadge mc';l.textContent='After Hours';d.style.background='#475569';}
}
tick();setInterval(tick,1000);
